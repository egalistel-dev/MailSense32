<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- BATTERIE -->
<rect x="60" y="40" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="125" y="61" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Batterie</text>
<text x="125" y="79" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">LiPo 3.7-4.2V</text>
<text x="95" y="110" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#1D9E75">+</text>
<text x="155" y="110" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#444441">-</text>
<line x1="95" y1="96" x2="95" y2="118" stroke="#1D9E75" stroke-width="2"/>
<line x1="155" y1="96" x2="155" y2="118" stroke="#444441" stroke-width="2"/>

<!-- TP4056 -->
<rect x="60" y="140" width="130" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="125" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#412402">TP4056</text>
<text x="125" y="186" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Chargeur LiPo</text>
<text x="95" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">BAT+</text>
<text x="155" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">BAT-</text>
<text x="95" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">OUT+</text>
<text x="155" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">OUT-</text>

<!-- Fils batterie -> TP4056 -->
<line x1="95" y1="118" x2="95" y2="140" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="155" y1="118" x2="155" y2="140" stroke="#444441" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Fils OUT sortant -->
<line x1="95" y1="240" x2="95" y2="262" stroke="#D85A30" stroke-width="2"/>
<line x1="155" y1="240" x2="155" y2="262" stroke="#444441" stroke-width="2"/>

<!-- POINT DERIVATION BAT+ -->
<circle cx="95" cy="119" r="5" fill="#BA7517"/>
<path d="M95 119 L95 109 L300 109" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="200" y="102" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">BAT+ (mesure)</text>

<!-- ESP32 -->
<rect x="480" y="140" width="150" height="200" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="555" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">ESP32</text>
<text x="555" y="186" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">DevKitC V4</text>
<text x="476" y="218" text-anchor="end" dominant-baseline="central" font-size="11" fill="#0C447C">VIN</text>
<text x="476" y="238" text-anchor="end" dominant-baseline="central" font-size="11" fill="#0C447C">GND</text>
<text x="476" y="278" text-anchor="end" dominant-baseline="central" font-size="11" fill="#0C447C">GPIO35</text>

<!-- OUT+ -> ESP32 VIN -->
<path d="M95 280 L95 310 L430 310 L430 218 L480 218" fill="none" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
<!-- OUT- -> ESP32 GND -->
<path d="M155 280 L155 320 L440 320 L440 238 L480 238" fill="none" stroke="#444441" stroke-width="2" marker-end="url(#arrow)"/>

<!-- PONT DIVISEUR -->
<rect x="240" y="78" width="160" height="22" rx="4" fill="none" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4,3"/>
<text x="320" y="89" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#854F0B">Pont diviseur</text>

<path d="M300 109 L320 109 L320 140" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,3"/>
<path d="M320 140 L320 160" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- R1 -->
<rect x="286" y="160" width="68" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="320" y="178" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">R1</text>
<text x="320" y="196" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">100 kO</text>

<path d="M320 210 L320 240" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Point jonction -->
<circle cx="320" cy="248" r="6" fill="#BA7517"/>
<text x="330" y="244" dominant-baseline="central" font-size="12" font-weight="500" fill="#854F0B">mesure</text>

<!-- Jonction -> GPIO35 -->
<path d="M326 248 L480 248 L480 278" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Jonction -> R2 -->
<path d="M320 254 L320 280" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- R2 -->
<rect x="286" y="280" width="68" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="320" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">R2</text>
<text x="320" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">220 kO</text>

<!-- R2 -> GND -->
<path d="M320 330 L320 358" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="306" y1="363" x2="334" y2="363" stroke="#444441" stroke-width="2"/>
<line x1="311" y1="369" x2="329" y2="369" stroke="#444441" stroke-width="1.5"/>
<line x1="316" y1="375" x2="324" y2="375" stroke="#444441" stroke-width="1"/>
<text x="320" y="388" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">GND</text>

<!-- FORMULE -->
<rect x="480" y="370" width="170" height="120" rx="8" fill="none" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="5,3"/>
<text x="565" y="390" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#854F0B">Calcul</text>
<text x="492" y="410" dominant-baseline="central" font-size="12" fill="#444441">V = Vbat x R2/(R1+R2)</text>
<text x="492" y="428" dominant-baseline="central" font-size="12" fill="#444441">= Vbat x 0.6875</text>
<line x1="492" y1="438" x2="640" y2="438" stroke="#DDDDDD" stroke-width="0.5"/>
<text x="492" y="454" dominant-baseline="central" font-size="12" fill="#444441">4.2V -&gt; 2.89V GPIO35</text>
<text x="492" y="472" dominant-baseline="central" font-size="12" fill="#444441">3.0V -&gt; 2.06V GPIO35</text>

<!-- LEGENDE -->
<rect x="40" y="400" width="180" height="110" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<text x="52" y="418" dominant-baseline="central" font-size="13" font-weight="500" fill="#2C2C2A">Legende</text>
<line x1="52" y1="434" x2="80" y2="434" stroke="#1D9E75" stroke-width="2"/>
<text x="88" y="438" dominant-baseline="central" font-size="12" fill="#444441">Alimentation +</text>
<line x1="52" y1="452" x2="80" y2="452" stroke="#D85A30" stroke-width="2"/>
<text x="88" y="456" dominant-baseline="central" font-size="12" fill="#444441">OUT+ vers ESP32</text>
<line x1="52" y1="470" x2="80" y2="470" stroke="#444441" stroke-width="2"/>
<text x="88" y="474" dominant-baseline="central" font-size="12" fill="#444441">GND</text>
<line x1="52" y1="488" x2="80" y2="488" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="88" y="492" dominant-baseline="central" font-size="12" fill="#444441">Mesure batterie</text>

</svg>
